name: CI - Backend

on:
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'backend_tmp/**'
      - '.github/workflows/ci-backend.yml'

jobs:
  build:
    name: Build (Java 21 / Gradle)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend_tmp

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Java 21 のセットアップ
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Gradle キャッシュを設定
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend_tmp/**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: gradlew に実行権限を付与
        run: chmod +x gradlew

      - name: ビルド（テストはスキップ）
        run: ./gradlew build -x test
