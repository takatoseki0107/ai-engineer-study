spring:
  application:
    name: TaskManagement
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/taskmanagement}
    username: ${DB_USERNAME:taskuser}
    password: ${DB_PASSWORD:taskpassword}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    defer-datasource-initialization: true
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: always
      schema-locations: classpath:db/init.sql

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:taskmanagement-jwt-secret-key-must-be-at-least-256-bits-long}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
